<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pão de Queijo Mineiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Pão de Queijo Mineiro</h1>

    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="cadastro.html">Cadastro</a>
    </nav>
</header>

<section class="banner">
    <h2>Cadastro</h2>
    <p>Crie sua conta para agilizar seus pedidos.</p>
</section>

<section id="cadastro" style="padding:50px 20px; text-align:center; max-width:900px; margin:0 auto;">
    <div class="produto" style="max-width:520px; margin:0 auto;">
        <h3>Seus dados</h3>
        <p style="margin-top:6px; color:#374151; line-height:1.6;">
            Preencha os campos abaixo.
        </p>

        <form style="margin-top:18px;" onsubmit="return false;">
            <div style="display:flex; flex-direction:column; gap:12px; text-align:left;">
                <label>
                    Nome
                    <input required type="text" name="nome" autocomplete="name"
                        style="width:100%; margin-top:6px; padding:12px; border-radius:8px; border:1px solid #e5e7eb; outline:none;" />
                </label>

                <label>
                    Email
                    <input required type="email" name="email" autocomplete="email"
                        style="width:100%; margin-top:6px; padding:12px; border-radius:8px; border:1px solid #e5e7eb; outline:none;" />
                </label>

                <label>
                    Telefone
                    <input required type="tel" name="telefone" autocomplete="tel" placeholder="(DDD) 99999-9999"
                        style="width:100%; margin-top:6px; padding:12px; border-radius:8px; border:1px solid #e5e7eb; outline:none;" />
                </label>

                <label>
                    Senha
                    <input required type="password" name="senha" autocomplete="new-password"
                        style="width:100%; margin-top:6px; padding:12px; border-radius:8px; border:1px solid #e5e7eb; outline:none;" minlength="6" />
                </label>

                <label>
                    Confirmar senha
                    <input required type="password" name="confirmarSenha" autocomplete="new-password"
                        style="width:100%; margin-top:6px; padding:12px; border-radius:8px; border:1px solid #e5e7eb; outline:none;" minlength="6" />
                </label>
            </div>

            <div style="display:flex; gap:12px; margin-top:18px; justify-content:center; flex-wrap:wrap;">
                <button class="botao-proxima" type="submit" style="border:none;">
                    Cadastrar
                </button>

                <a href="index.html" class="botao-proxima" style="background:#16a34a;">
                    Voltar
                </a>
            </div>

        </form>
    </div>
</section>

<footer>
    <p>© 2026 Pão de Queijo Mineiro</p>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pão de Queijo Mineiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="estilos/cadastro.css">
</head>

<body>

<header>
    <h1>Pão de Queijo Mineiro</h1>

    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="cadastro.html">Cadastro</a>


    </nav>
</header>

<section class="banner">
    <h2>Cadastro</h2>
    <p>Crie sua conta para agilizar seus pedidos.</p>
</section>

<section id="cadastro" class="cadastro">
    <div class="produto cadastro__box">
        <h3>Seus dados</h3>
        <p class="cadastro__descricao">Preencha os campos abaixo.</p>



        <form id="formCadastro" class="cadastro__form">

            <div class="cadastro__campos">
                <label class="cadastro__campo">
                    Nome
                    <input required type="text" name="nome" autocomplete="name" class="cadastro__input" />
                </label>


                <label class="cadastro__campo">
                    Email
                    <input required type="email" name="email" autocomplete="email" class="cadastro__input" />
                </label>

                <label class="cadastro__campo">
                    Telefone
                    <input required type="tel" name="telefone" autocomplete="tel" placeholder="(DDD) 99999-9999" class="cadastro__input" />
                </label>

                <div class="cadastro__linha">
                    <label class="cadastro__campo cadastro__campo--2">
                        Bairro
                        <input required type="text" name="bairro" autocomplete="sublocality" placeholder="Bairro" class="cadastro__input" />
                    </label>

                    <label class="cadastro__campo cadastro__campo--2">
                        Rua
                        <input required type="text" name="rua" autocomplete="street-address" placeholder="Rua/Av. ..." class="cadastro__input" />
                    </label>

                    <label class="cadastro__campo cadastro__campo--1">
                        Número
                        <input required type="text" name="numero" autocomplete="address-line2" placeholder="Nº" class="cadastro__input" />
                    </label>
                </div>

                <label class="cadastro__campo">
                    Senha
                    <input required type="password" name="senha" autocomplete="new-password" class="cadastro__input" minlength="6" />
                </label>

                <label class="cadastro__campo">
                    Confirmar senha
                    <input required type="password" name="confirmarSenha" autocomplete="new-password" class="cadastro__input" minlength="6" />
                </label>


            </div>


            <div class="cadastro__acoes">
                <button class="botao-proxima" type="submit">Cadastrar</button>

                <a href="index.html" class="botao-proxima botao-proxima--verde">Voltar</a>
            </div>


        </form>
    </div>
</section>

<footer>
    <p>© 2026 Pão de Queijo Mineiro</p>
</footer>
<script src="script.js" defer></script>
<script src="scripts/salvamento.js" defer></script>

</body>
</html>

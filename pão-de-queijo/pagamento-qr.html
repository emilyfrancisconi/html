<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pix - Pão de Queijo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="estilos/pagamento-pr.css">

</head>
<body>

<header>
    <h1>Pão de Queijo Mineiro</h1>
    <nav>
        <a href="proxima.html">Voltar</a>
        <a href="#contato">Contato</a>
    </nav>
</header>

<section class="banner">
    <h2>Pagamento via Pix</h2>
    <p>Escaneie o QR Code ou copie e cole o código.</p>
</section>

<section id="pix-container">
    <div class="box">
        <h3>Total a pagar</h3>
        <p class="pix__valor" id="pix-valor">R$ 0,00</p>


        <div id="pix-qr-wrap">
            <div id="pix-qr-holder">
                <img class="pix__qr" src="imagens/escaneie-me-o-codigo-qr_78370-9714.avif" alt="QR Code Pix" width="256" height="256" src="imagens/qr-code.png" />


            </div>
        </div>

        

        <button class="btn" onclick="copyPix()">Copiar código Pix</button>


        <div class="pix__copybox">

            <label class="pix__label">Copia e cola</label>

            <textarea id="pix-copia-e-cola" readonly></textarea>
        </div>

        <p class="pix__help">Se não aparecer o QR Code, copie o código Pix acima.</p>

    </div>
</section>



<footer>
    <p>© 2026 Pão de Queijo Mineiro</p>
</footer>

<script src="./scripts/pix.js"></script>
<script src="./scripts/pagamento-qr.js"></script>
</body>
</html>
